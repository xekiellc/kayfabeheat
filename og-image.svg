<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F7E020"/>
      <stop offset="30%" stop-color="#ED4A6A"/>
      <stop offset="60%" stop-color="#9010A8"/>
      <stop offset="100%" stop-color="#2A10E0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Heavy border -->
  <rect x="16" y="16" width="1168" height="598" fill="none" stroke="#1A0000" stroke-width="12"/>

  <!-- Top divider bar -->
  <rect x="16" y="180" width="1168" height="14" fill="#1A0000"/>

  <!-- Bottom divider bar -->
  <rect x="16" y="430" width="1168" height="10" fill="#1A0000"/>

  <!-- Main title -->
  <text x="600" y="155" font-family="Impact, Arial Black, sans-serif" font-size="148" font-weight="900" fill="#1A0000" text-anchor="middle" letter-spacing="8">KAYFABE HEAT</text>

  <!-- Tagline -->
  <text x="600" y="330" font-family="Impact, Arial Black, sans-serif" font-size="52" fill="#1A0000" text-anchor="middle" letter-spacing="12">WORK · SHOOT · HEAT</text>

  <!-- Sub line -->
  <text x="600" y="400" font-family="Georgia, serif" font-size="28" fill="#1A000099" text-anchor="middle" letter-spacing="4">Pro Wrestling News · Updated 4× Daily</text>

  <!-- URL -->
  <text x="600" y="510" font-family="Impact, Arial Black, sans-serif" font-size="36" fill="#1A0000" text-anchor="middle" letter-spacing="6">KAYFABEHEAT.COM</text>

  <!-- Heat badge left -->
  <rect x="60" y="460" width="160" height="120" fill="#1A0000" stroke="#F7E020" stroke-width="4"/>
  <text x="140" y="510" font-family="Impact, Arial Black, sans-serif" font-size="18" fill="#F7E020" text-anchor="middle" letter-spacing="2">HEAT LEVEL</text>
  <text x="140" y="565" font-family="Impact, Arial Black, sans-serif" font-size="52" fill="#F7E020" text-anchor="middle">99°</text>

  <!-- Heat badge right -->
  <rect x="980" y="460" width="160" height="120" fill="#1A0000" stroke="#F7E020" stroke-width="4"/>
  <text x="1060" y="510" font-family="Impact, Arial Black, sans-serif" font-size="18" fill="#F7E020" text-anchor="middle" letter-spacing="2">HEAT LEVEL</text>
  <text x="1060" y="565" font-family="Impact, Arial Black, sans-serif" font-size="52" fill="#F7E020" text-anchor="middle">99°</text>
</svg>
